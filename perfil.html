<!DOCTYPE html>
<html data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meu perfil</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="icon" type="image/x-icon" href="./assets/icons/favicon-mcars.svg">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body style="background-color: #f3f3f3;">
    <br>
    <div class="container is-fluid">
        <div class="container block">
            <div class="columns is-gapless is-mobile">
                    <div class="column is-narrow">
                        <button onclick="voltar()" class="button has-text-black-bis is-ghost">
                            <i class="ph ph-caret-left"></i>
                        </button>
                    </div>
                    <div class="column">
                        <h4 class="has-text-weight-bold is-size-4 has-text-centered">
                            Meu perfil
                        </h4>
                    </div>
              </div>
        </div>
    </div>
    <br>
    <div class="container is-fluid">
        <div class="container painel-escuro">
            <div class="has-text-centered">
                <div style="position: relative; display: inline-block;">
                    <img id="perfil-foto-img" src="" alt="Foto de perfil" style="width: 96px; height: 96px; border-radius: 50%; object-fit: cover; display: none;">
                    <i id="perfil-foto-icone" class="ph ph-user-circle ph-5x" style="color: aliceblue;"></i>
                    <button type="button" onclick="document.getElementById('perfil-foto-input').click()" class="button is-white" style="position: absolute; bottom: 0; right: -10px; border-radius: 50%; width: 2.2em; height: 2.2em; padding: 0;">
                        <i class="ph ph-camera"></i>
                    </button>
                    <input type="file" id="perfil-foto-input" accept="image/png, image/jpeg, image/webp" style="display: none;" onchange="enviarFoto(this.files[0])">
                </div>
            </div>
            <br>
            <h2 class="title is-3 has-text-centered" style="color: aliceblue;" id="perfil-saudacao">Olá! 👋</h2>
            <p class="is-size-5 has-text-centered" style="color: aliceblue;">Estes são os dados da sua conta</p>
            <br>
            <div class="field">
                <label class="label" style="color: aliceblue;">Nome</label>
                <div class="control has-icons-left">
                    <input class="input is-medium" type="text" id="perfil-nome" readonly>
                    <span class="icon is-small is-left">
                      <i class="ph ph-user"></i>
                    </span>
                </div>
            </div>
            <div class="field">
                <label class="label" style="color: aliceblue;">Email</label>
                <div class="control has-icons-left">
                    <input class="input is-medium" type="email" id="perfil-email" readonly>
                    <span class="icon is-small is-left">
                      <i class="ph ph-envelope"></i>
                    </span>
                </div>
            </div>
            <div class="field">
                <label class="label" style="color: aliceblue;">CPF</label>
                <div class="control has-icons-left">
                    <input class="input is-medium" type="text" id="perfil-cpf" placeholder="000.000.000-00" maxlength="14">
                    <span class="icon is-small is-left">
                      <i class="ph ph-identification-card"></i>
                    </span>
                </div>
            </div>
            <br>
            <p class="is-size-6 has-text-weight-bold" style="color: aliceblue;">Endereço</p>
            <br>
            <div class="columns is-mobile">
                <div class="column is-7">
                    <div class="field">
                        <label class="label" style="color: aliceblue;">CEP</label>
                        <div class="control">
                            <input class="input is-medium" type="text" id="perfil-cep" placeholder="00000-000" maxlength="9">
                        </div>
                    </div>
                </div>
                <div class="column is-5">
                    <div class="field">
                        <label class="label" style="color: aliceblue;">Número</label>
                        <div class="control">
                            <input class="input is-medium" type="text" id="perfil-numero" placeholder="Nº">
                        </div>
                    </div>
                </div>
            </div>
            <div class="field">
                <label class="label" style="color: aliceblue;">Rua</label>
                <div class="control">
                    <input class="input is-medium" type="text" id="perfil-rua" placeholder="Ex.: Av. Brasil">
                </div>
            </div>
            <div class="field">
                <label class="label" style="color: aliceblue;">Bairro</label>
                <div class="control">
                    <input class="input is-medium" type="text" id="perfil-bairro" placeholder="Ex.: Centro">
                </div>
            </div>
            <div class="columns is-mobile">
                <div class="column is-8">
                    <div class="field">
                        <label class="label" style="color: aliceblue;">Cidade</label>
                        <div class="control">
                            <input class="input is-medium" type="text" id="perfil-cidade" placeholder="Ex.: Goiânia">
                        </div>
                    </div>
                </div>
                <div class="column is-4">
                    <div class="field">
                        <label class="label" style="color: aliceblue;">Estado</label>
                        <div class="control">
                            <input class="input is-medium" type="text" id="perfil-estado" placeholder="UF" maxlength="2">
                        </div>
                    </div>
                </div>
            </div>
            <br>
            <div class="field">
                <p class="control">
                    <button onclick="salvarPerfil()" class="button is-white is-large is-fullwidth" id="btn-salvar-perfil">
                        Salvar alterações
                    </button>
                </p>
            </div>
            <div class="field" id="campo-link-admin" style="display: none;">
                <p class="control">
                    <a href="admin/veiculos.html" class="button is-large is-fullwidth" style="background: transparent; border: 1px solid aliceblue; color: aliceblue;">
                        <i class="ph ph-gear" style="margin-right: 0.5em;"></i> Painel administrativo
                    </a>
                </p>
            </div>
            <div class="field">
                <p class="control">
                    <button onclick="sair()" class="button is-large is-fullwidth" id="btn-sair" style="background: transparent; border: 1px solid aliceblue; color: aliceblue;">
                        Sair da conta
                    </button>
                </p>
            </div>
        </div>
    </div>
    <br><br><br><br>
    <!-- MENU FLUTUANTE -->
     <div class="container is-fluid floating-menu">
        <div class="fixed-grid has-4-cols has-background-dark has-radius-large box">
            <div class="grid is-flex is-justify-content-space-around">
                <a href="home.html" class="has-text-white"><div class="cell"><i class="ph ph-house is-size-4"></i></div></a>
                <a href="cart_buy.html" class="has-text-white"><div class="cell"><i class="ph ph-shopping-bag is-size-4"></i></div></a>
                <a href="#" class="has-text-white"><div class="cell"><i class="ph ph-map-trifold is-size-4"></i></div></a>
                <a href="perfil.html" class="has-text-white"><div class="cell"><i class="ph-fill ph-user is-size-4"></i></div></a>
            </div>
          </div>
     </div>
</body>
 <!-- Javascript início -->
 <script src="./js/javascript.js"></script>
 <!-- Fim Javascript -->
</html>

<!DOCTYPE html>
<html data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MCars</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="icon" type="image/x-icon" href="./assets/icons/favicon-mcars.svg">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body style="background-color: #f3f3f3;">
    <!-- MENU SUPERIOR NAVBAR -->
    <div class="container is-fluid pt-5">
        <div class="container block">
            <div class="is-flex is-justify-content-space-between">
                <figure class="image is-32x32">
                    <img src="./assets/logos/logo-mc-black.svg" alt="">
                </figure>
                <div class="notifications">
                    <span class="icon"><i class="ph ph-bell ph-2x"></i></span>
                    <span class="badge"></span>
                </div>
            </div>
        </div>
    </div>
    <br>
    <!-- BARRA DE PESQUISA -->
    <div class="container is-fluid">
        <div class="container">
            <div class="input-wrapper box">
                <i class="ph ph-magnifying-glass has-text-grey-light is-size-4"></i>
                <input type="text" id="campo-busca" placeholder="Pesquisar">
                <a href="#"><i class="ph ph-sliders-horizontal has-text-grey-light is-size-4"></i></a>
            </div>
        </div>
    </div>
    <br>
<!-- AQUI SERÁ O CARROSEL COM OS DESTAQUES DO MÊS -->
    <div class="container is-fluid">
        <div class="wrapper">
            <ul class="carousel" id="carrossel-destaques"></ul>
        </div>
    </div>
    <!-- CARD RECOMENDAÇÕES -->
    <div class="container is-fluid">
            <div class="container block">
                <div class="is-flex is-justify-content-space-between">
                    <p><strong>Recomendações</strong></p>
                    <p><a href="#" class="has-text-grey-light">Ver tudo</a></p>
                </div>
            </div>
            <div class="container">
                <div class="grid" id="grid-recomendacoes"></div>
            </div>
    </div>
    
    <!-- MENU FLUTUANTE -->
     <div class="container is-fluid floating-menu">
        <div class="fixed-grid has-4-cols has-background-dark has-radius-large box">
            <div class="grid is-flex is-justify-content-space-around">
                <a href="home.html" class="has-text-white"><div class="cell"><i class="ph-fill ph-house is-size-4"></i></div></a>
                <a href="cart_buy.html" class="has-text-white"><div class="cell"><i class="ph ph-shopping-bag is-size-4"></i> </div></a>
                <a href="#" class="has-text-white"><div class="cell"><i class="ph ph-map-trifold is-size-4"></i></div></a>
                <a href="perfil.html" class="has-text-white"><div class="cell"><i class="ph ph-user is-size-4"></i></div></a>
            </div>
          </div>
     </div>
</body>
 <!-- Javascript início -->
 <script src="./js/javascript.js"></script>
 <!-- Fim Javascript -->
</html>
